<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幻彩俄羅斯方塊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            display: flex;
            gap: 24px;
            padding: 24px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 1.5rem;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            border: 2px solid #334155;
            background-color: #000;
            border-radius: 8px;
            display: block;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 140px;
        }

        .stat-box {
            background: rgba(30, 41, 59, 0.7);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-hint {
            margin-top: auto;
            font-size: 0.75rem;
            color: #475569;
            line-height: 1.6;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 24px;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #0f172a;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0f172a;
            background: #334155;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 1.5rem;
            backdrop-filter: blur(8px);
        }

        .hidden {
            display: none !important;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        }
    </style>
</head>
<body>

    <div id="game-wrapper" class="relative">
        <div id="game-container">
            <canvas id="tetris" width="240" height="400"></canvas>

            <div class="side-panel">
                <div class="stat-box">
                    <div class="stat-label">NEXT</div>
                    <canvas id="next" width="100" height="100"></canvas>
                </div>
                <div class="stat-box">
                    <div class="stat-label">SCORE</div>
                    <div id="score" class="stat-value">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">LEVEL</div>
                    <div id="level" class="stat-value">1</div>
                </div>
                <div class="controls-hint">
                    鍵盤操作：<br>
                    ← → 移動<br>
                    ↑ 順時針旋轉<br>
                    Z 逆時針旋轉<br>
                    ↓ 加速 / 空白鍵 墜落
                </div>
            </div>
        </div>

        <div id="overlay">
            <h1 class="text-5xl font-black mb-2 text-white glow-text italic">NEON</h1>
            <h1 class="text-4xl font-black mb-8 text-sky-500 glow-text italic">TETRIS</h1>
            <p id="final-score" class="mb-6 hidden text-2xl font-bold text-white">SCORE: 0</p>
            <button id="start-btn" class="bg-sky-500 hover:bg-sky-400 text-white px-10 py-4 rounded-2xl font-black text-xl transition-all shadow-[0_0_20px_rgba(14,165,233,0.5)] active:scale-95">
                START GAME
            </button>
        </div>
    </div>

    <div class="mobile-controls md:hidden">
        <button class="btn" id="ctrl-left">←</button>
        <button class="btn" id="ctrl-rotate">↻</button>
        <button class="btn" id="ctrl-right">→</button>
        <button class="btn" id="ctrl-z">↺</button>
        <button class="btn" id="ctrl-down">↓</button>
        <button class="btn bg-sky-900" id="ctrl-space">⤓</button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const finalScoreLabel = document.getElementById('final-score');

        context.scale(20, 20);
        nextContext.scale(25, 25);

        // 多元配色與漸層定義
        const colorPalette = [
            null,
            { main: '#00f0f0', light: '#70ffff', dark: '#00a0a0' }, // I (青色)
            { main: '#f0a000', light: '#ffcf70', dark: '#a06000' }, // L (橘色)
            { main: '#0040f0', light: '#7090ff', dark: '#0000a0' }, // J (深藍)
            { main: '#f0f000', light: '#ffff70', dark: '#a0a000' }, // O (黃色)
            { main: '#f00000', light: '#ff7070', dark: '#a00000' }, // Z (紅色)
            { main: '#00f000', light: '#70ff70', dark: '#00a000' }, // S (綠色)
            { main: '#a000f0', light: '#df70ff', dark: '#6000a0' }, // T (紫色)
        ];

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function draw() {
            // 背景與網格
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // 繪製微弱網格線
            context.strokeStyle = 'rgba(255,255,255,0.03)';
            context.lineWidth = 0.05;
            for(let x=0; x<12; x++) {
                context.beginPath(); context.moveTo(x, 0); context.lineTo(x, 20); context.stroke();
            }
            for(let y=0; y<20; y++) {
                context.beginPath(); context.moveTo(0, y); context.lineTo(12, y); context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const color = colorPalette[value];
                        const xx = x + offset.x;
                        const yy = y + offset.y;

                        // 漸層填充
                        const gradient = ctx.createLinearGradient(xx, yy, xx + 1, yy + 1);
                        gradient.addColorStop(0, color.light);
                        gradient.addColorStop(0.5, color.main);
                        gradient.addColorStop(1, color.dark);
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(xx + 0.05, yy + 0.05, 0.9, 0.9);

                        // 亮邊
                        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(xx + 0.1, yy + 0.1, 0.8, 0.8);
                    }
                });
            });
        }

        function drawNext() {
            nextContext.fillStyle = '#1e293b';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            const matrix = player.next;
            if(!matrix) return;
            
            const offset = {
                x: (nextCanvas.width / 50) - (matrix[0].length / 2),
                y: (nextCanvas.height / 50) - (matrix.length / 2)
            };
            drawMatrix(matrix, offset, nextContext);
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (!player.next) player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) gameOver();
            drawNext();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = true;

        function update(time = 0) {
            if (isGameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            const newLevel = Math.floor(player.score / 100) + 1;
            levelElement.innerText = newLevel;
            dropInterval = Math.max(100, 1000 - (newLevel - 1) * 100);
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };

        function gameOver() {
            isGameOver = true;
            finalScoreLabel.innerText = `SCORE: ${player.score}`;
            finalScoreLabel.classList.remove('hidden');
            startBtn.innerText = "TRY AGAIN";
            overlay.classList.remove('hidden');
        }

        function startGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            updateScore();
            isGameOver = false;
            player.next = null;
            playerReset();
            overlay.classList.add('hidden');
            requestAnimationFrame(update);
        }

        // 鍵盤監聽
        document.addEventListener('keydown', event => {
            if (isGameOver) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38 || event.keyCode === 88) playerRotate(1);
            else if (event.keyCode === 90) playerRotate(-1);
            else if (event.keyCode === 32) playerHardDrop();
        });

        startBtn.addEventListener('click', startGame);

        // 手機操作
        document.getElementById('ctrl-left').addEventListener('click', () => !isGameOver && playerMove(-1));
        document.getElementById('ctrl-right').addEventListener('click', () => !isGameOver && playerMove(1));
        document.getElementById('ctrl-down').addEventListener('click', () => !isGameOver && playerDrop());
        document.getElementById('ctrl-rotate').addEventListener('click', () => !isGameOver && playerRotate(1));
        document.getElementById('ctrl-z').addEventListener('click', () => !isGameOver && playerRotate(-1));
        document.getElementById('ctrl-space').addEventListener('click', () => !isGameOver && playerHardDrop());

    </script>
</body>
</html>
