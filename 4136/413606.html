<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>跑酷遊戲</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #87CEEB;
    }
    canvas {
        display: block;
        margin: auto;
        background: #f0f0f0;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 50,
    y: 200,
    width: 40,
    height: 40,
    dy: 0,
    gravity: 0.8,
    jumpForce: -15,
    grounded: true
};

let obstacles = [];
let score = 0;
let gameOver = false;

function drawPlayer() {
    ctx.fillStyle = "black";
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawObstacle(ob) {
    ctx.fillStyle = "red";
    ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
}

function updatePlayer() {
    player.y += player.dy;

    if (!player.grounded) {
        player.dy += player.gravity;
    }

    if (player.y >= 200) {
        player.y = 200;
        player.grounded = true;
        player.dy = 0;
    }
}

function spawnObstacle() {
    let size = 20 + Math.random() * 30;
    obstacles.push({
        x: canvas.width,
        y: 240 - size,
        width: size,
        height: size
    });
}

function updateObstacles() {
    for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].x -= 5;

        // 碰撞偵測
        if (
            player.x < obstacles[i].x + obstacles[i].width &&
            player.x + player.width > obstacles[i].x &&
            player.y < obstacles[i].y + obstacles[i].height &&
            player.y + player.height > obstacles[i].y
        ) {
            gameOver = true;
        }
    }

    obstacles = obstacles.filter(ob => ob.x > -50);
}

function drawScore() {
    ctx.fillStyle = "black";
    ctx.font = "20px Arial";
    ctx.fillText("分數: " + score, 10, 20);
}

function gameLoop() {
    if (gameOver) {
        ctx.fillStyle = "black";
        ctx.font = "40px Arial";
        ctx.fillText("遊戲結束!", 300, 150);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updatePlayer();
    updateObstacles();

    drawPlayer();
    obstacles.forEach(drawObstacle);
    drawScore();

    score++;

    if (Math.random() < 0.02) {
        spawnObstacle();
    }

    requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space" && player.grounded) {
        player.dy = player.jumpForce;
        player.grounded = false;
    }
});

gameLoop();
</script>

</body>
</html>
