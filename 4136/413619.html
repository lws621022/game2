<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星際躲避者 - Star Dodger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
            transition: opacity 0.3s;
        }
        .hidden {
            display: none !important;
        }
        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
        }
        .btn:active {
            transform: scale(0.95);
        }
        #score-display {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            color: #fbbf24;
        }
        .lives-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .heart {
            color: #ef4444;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.5));
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="flex justify-between items-start">
            <div>
                <div id="score-display">分數: 0</div>
                <div id="lives-display" class="lives-container"></div>
            </div>
            <div id="high-score" class="text-xl text-gray-400">最高紀錄: 0</div>
        </div>
        <div class="text-center text-sm text-gray-500 opacity-50">
            使用滑鼠、觸控或方向鍵移動
        </div>
    </div>

    <div id="start-menu" class="menu-overlay">
        <h1 class="text-6xl font-black text-white mb-4 tracking-tighter">STAR <span class="text-indigo-500">DODGER</span></h1>
        <p class="text-gray-400 mb-8">你有 3 次生存機會。躲避隕石，挑戰極限！</p>
        <button id="start-btn" class="btn">開始遊戲</button>
    </div>

    <div id="game-over-menu" class="menu-overlay hidden">
        <h2 class="text-5xl font-bold text-red-500 mb-2">任務失敗</h2>
        <p id="final-score" class="text-2xl text-white mb-6">最終得分: 0</p>
        <button id="restart-btn" class="btn">再次挑戰</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score-display');
        const livesElement = document.getElementById('lives-display');
        const finalScoreElement = document.getElementById('final-score');
        const highScoreElement = document.getElementById('high-score');
        
        // --- 音效系統 (Web Audio API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'hit') {
                // 受傷：低沉爆炸聲
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start();
                osc.stop(now + 0.2);
            } else if (type === 'collect') {
                // 收集：清脆高音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start();
                osc.stop(now + 0.1);
            } else if (type === 'gameover') {
                // 遊戲結束：向下衰減音
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.5);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start();
                osc.stop(now + 0.5);
            }
        }

        // --- 遊戲邏輯 ---
        let gameState = 'MENU'; 
        let score = 0;
        let highScore = localStorage.getItem('starDodgerHighScore') || 0;
        highScoreElement.innerText = `最高紀錄: ${highScore}`;

        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            targetX: 0,
            targetY: 0,
            speed: 0.15,
            color: '#4f46e5',
            trail: [],
            lives: 3,
            invincible: 0,
        };

        let enemies = [];
        let particles = [];
        let powerups = [];
        let stars = [];
        let lastTime = 0;
        let spawnTimer = 0;
        let difficultyMultiplier = 1;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (gameState === 'MENU') {
                player.x = canvas.width / 2;
                player.y = canvas.height * 0.8;
                player.targetX = player.x;
                player.targetY = player.y;
            }
        }

        window.addEventListener('resize', resize);
        resize();

        const handleInput = (e) => {
            if (gameState !== 'PLAYING') return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            player.targetX = x;
            player.targetY = y;
        };

        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput);

        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 3 + 1
            });
        }

        function updateLivesUI() {
            livesElement.innerHTML = '';
            for (let i = 0; i < player.lives; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.innerHTML = '❤';
                livesElement.appendChild(heart);
            }
        }

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function spawnEnemy() {
            const size = Math.random() * 40 + 20;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -size,
                width: size,
                height: size,
                speed: (Math.random() * 3 + 2) * difficultyMultiplier,
                rotation: 0,
                rotationSpeed: Math.random() * 0.1 - 0.05
            });
        }

        function spawnPowerup() {
            powerups.push({
                x: Math.random() * canvas.width,
                y: -30,
                width: 25,
                height: 25,
                speed: 3,
                color: '#fbbf24'
            });
        }

        function resetGame() {
            initAudio(); // 必須在使用者互動時初始化音訊
            score = 0;
            difficultyMultiplier = 1;
            enemies = [];
            powerups = [];
            particles = [];
            player.trail = [];
            player.lives = 3;
            player.invincible = 0;
            scoreElement.innerText = `分數: 0`;
            updateLivesUI();
            gameState = 'PLAYING';
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('game-over-menu').classList.add('hidden');
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            playSound('gameover');
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('starDodgerHighScore', highScore);
                highScoreElement.innerText = `最高紀錄: ${highScore}`;
            }
            finalScoreElement.innerText = `最終得分: ${score}`;
            document.getElementById('game-over-menu').classList.remove('hidden');
            createExplosion(player.x, player.y, '#ffffff', 40);
        }

        function update(deltaTime) {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            if (gameState === 'PLAYING') {
                difficultyMultiplier += 0.0001;

                if (player.invincible > 0) {
                    player.invincible -= deltaTime;
                }

                player.x += (player.targetX - player.x) * player.speed;
                player.y += (player.targetY - player.y) * player.speed;

                player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
                player.y = Math.max(player.height/2, Math.min(canvas.height - player.height/2, player.y));

                player.trail.unshift({x: player.x, y: player.y});
                if (player.trail.length > 10) player.trail.pop();

                spawnTimer += deltaTime;
                if (spawnTimer > 400 / difficultyMultiplier) {
                    spawnEnemy();
                    spawnTimer = 0;
                    if (Math.random() > 0.98) spawnPowerup();
                }

                enemies.forEach((enemy, index) => {
                    enemy.y += enemy.speed;
                    enemy.rotation += enemy.rotationSpeed;
                    
                    const dx = player.x - enemy.x;
                    const dy = player.y - enemy.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < (player.width/2 + enemy.width/2) - 5) {
                        if (player.invincible <= 0) {
                            player.lives--;
                            updateLivesUI();
                            playSound('hit'); // 播放被擊中音效
                            createExplosion(player.x, player.y, '#ef4444', 20);
                            
                            if (player.lives <= 0) {
                                gameOver();
                            } else {
                                player.invincible = 2000;
                                enemies.splice(index, 1);
                            }
                        }
                    }

                    if (enemy.y > canvas.height + 100) {
                        enemies.splice(index, 1);
                        score += 10;
                        scoreElement.innerText = `分數: ${score}`;
                    }
                });

                powerups.forEach((p, index) => {
                    p.y += p.speed;
                    const dx = player.x - p.x;
                    const dy = player.y - p.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 30) {
                        powerups.splice(index, 1);
                        score += 500;
                        playSound('collect'); // 播放收集音效
                        if (player.lives < 3 && Math.random() > 0.5) {
                            player.lives++;
                            updateLivesUI();
                        }
                        createExplosion(p.x, p.y, p.color);
                    }
                });
            }

            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(index, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.globalAlpha = star.size / 2;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            player.trail.forEach((pos, i) => {
                ctx.globalAlpha = (1 - i / player.trail.length) * 0.3;
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, (player.width/2) * (1 - i/10), 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            if (gameState !== 'GAMEOVER') {
                if (player.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
                    ctx.globalAlpha = 0.3;
                }
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.moveTo(-10, 15);
                ctx.lineTo(0, 25 + Math.random() * 10);
                ctx.lineTo(10, 15);
                ctx.fill();
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(20, 15);
                ctx.lineTo(-20, 15);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#93c5fd';
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.globalAlpha = 1.0;
            }

            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                ctx.rotate(enemy.rotation);
                ctx.fillStyle = '#52525b';
                ctx.strokeStyle = '#71717a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for(let i=0; i<6; i++) {
                    const angle = (i/6) * Math.PI * 2;
                    const r = enemy.width/2 * (0.8 + Math.random() * 0.4);
                    const tx = Math.cos(angle) * r;
                    const ty = Math.sin(angle) * r;
                    if(i===0) ctx.moveTo(tx, ty);
                    else ctx.lineTo(tx, ty);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });

            powerups.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y - p.height/2);
                ctx.lineTo(p.x + p.width/2, p.y);
                ctx.lineTo(p.x, p.y + p.height/2);
                ctx.lineTo(p.x - p.width/2, p.y);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            update(deltaTime);
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('start-btn').addEventListener('click', resetGame);
        document.getElementById('restart-btn').addEventListener('click', resetGame);

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
