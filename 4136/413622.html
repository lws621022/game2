<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螢幕破壞者 - 壓力發洩模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #score-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: #fff; }
        #combo-msg { position: absolute; right: 50px; top: 100px; color: #fbbf24; font-size: 3rem; font-weight: 900; opacity: 0; transform: scale(0.5); transition: all 0.2s; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
        .stat-value { font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        #damage-indicator { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 300px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; }
        #damage-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #ef4444); border-radius: 5px; transition: width 0.3s; }
        .control-hint { position: absolute; bottom: 15px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.75rem; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="score-container">
            <div class="stat-label">目前分數 (SCORE)</div>
            <div id="score-val" class="stat-value">000,000</div>
        </div>

        <div id="combo-msg">COMBO x5</div>

        <div id="damage-indicator">
            <div class="stat-label text-center mb-1">螢幕損毀度</div>
            <div id="damage-fill"></div>
        </div>

        <div class="control-hint">
            點擊滑鼠左鍵/右鍵進行攻擊 | 連續擊打可獲得更高積分
        </div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let screenObj, monitorFrame, playerHands = { left: null, right: null };
        let score = 0;
        let damage = 0;
        let combo = 0;
        let lastHitTime = 0;
        let isPunching = false;
        let shake = 0;
        let crackTextures = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            scene.fog = new THREE.Fog(0x1a1a1a, 5, 15);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // 光影
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);
            const deskLight = new THREE.PointLight(0x3b82f6, 1.5, 10);
            deskLight.position.set(0, 2, 1);
            scene.add(deskLight);

            createOffice();
            createMonitor();
            createHands();

            window.addEventListener('mousedown', onAction);
            window.addEventListener('resize', onResize);

            animate();
        }

        function createOffice() {
            // 桌子
            const deskGeo = new THREE.BoxGeometry(5, 0.1, 2);
            const deskMat = new THREE.MeshPhongMaterial({ color: 0x2a2a2a });
            const desk = new THREE.Mesh(deskGeo, deskMat);
            desk.position.set(0, 0.5, 0);
            desk.receiveShadow = true;
            scene.add(desk);

            // 背景牆
            const wallGeo = new THREE.PlaneGeometry(20, 10);
            const wallMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.z = -2;
            scene.add(wall);
        }

        function createMonitor() {
            const group = new THREE.Group();

            // 螢幕外框
            const frameGeo = new THREE.BoxGeometry(2.2, 1.4, 0.1);
            const frameMat = new THREE.MeshPhongMaterial({ color: 0x050505 });
            monitorFrame = new THREE.Mesh(frameGeo, frameMat);
            monitorFrame.position.y = 1.3;
            group.add(monitorFrame);

            // 螢幕面板 (顯示內容)
            const screenGeo = new THREE.PlaneGeometry(2.0, 1.2);
            const screenMat = new THREE.MeshBasicMaterial({ 
                color: 0x0ea5e9, // 預設藍屏或工作介面顏色
                side: THREE.DoubleSide
            });
            screenObj = new THREE.Mesh(screenGeo, screenMat);
            screenObj.position.set(0, 1.3, 0.06);
            group.add(screenObj);

            // 支架
            const standGeo = new THREE.BoxGeometry(0.2, 0.8, 0.1);
            const stand = new THREE.Mesh(standGeo, frameMat);
            stand.position.y = 0.8;
            group.add(stand);

            const baseGeo = new THREE.BoxGeometry(0.8, 0.05, 0.6);
            const base = new THREE.Mesh(baseGeo, frameMat);
            base.position.y = 0.5;
            group.add(base);

            scene.add(group);
        }

        function createHands() {
            const handGeo = new THREE.BoxGeometry(0.3, 0.3, 0.5);
            const handMat = new THREE.MeshPhongMaterial({ color: 0xd2b48c });

            playerHands.left = new THREE.Mesh(handGeo, handMat);
            playerHands.left.position.set(-0.8, 0.8, 1.5);
            scene.add(playerHands.left);

            playerHands.right = new THREE.Mesh(handGeo, handMat);
            playerHands.right.position.set(0.8, 0.8, 1.5);
            scene.add(playerHands.right);
        }

        function onAction(e) {
            if (isPunching) return;
            const isLeft = e.button === 0;
            const hand = isLeft ? playerHands.left : playerHands.right;
            executePunch(hand);
        }

        function executePunch(hand) {
            isPunching = true;
            const startPos = hand.position.clone();
            const targetPos = new THREE.Vector3(0, 1.3, 0.2);
            
            let startTime = performance.now();
            const duration = 150;

            function animatePunch() {
                let now = performance.now();
                let p = (now - startTime) / duration;

                if (p < 0.5) {
                    hand.position.lerpVectors(startPos, targetPos, p * 2);
                } else if (p < 1) {
                    if (p > 0.5 && p < 0.6) applyDamage();
                    hand.position.lerpVectors(targetPos, startPos, (p - 0.5) * 2);
                } else {
                    hand.position.copy(startPos);
                    isPunching = false;
                    return;
                }
                requestAnimationFrame(animatePunch);
            }
            animatePunch();
        }

        function applyDamage() {
            damage += 2;
            if (damage > 100) damage = 100;

            // 計算分數
            const now = Date.now();
            if (now - lastHitTime < 500) {
                combo++;
            } else {
                combo = 1;
            }
            lastHitTime = now;

            const hitScore = 100 * combo;
            score += hitScore;

            // UI 更新
            document.getElementById('score-val').innerText = score.toLocaleString().padStart(7, '0');
            document.getElementById('damage-fill').style.width = damage + '%';

            // Combo 顯示
            if (combo > 1) {
                const el = document.getElementById('combo-msg');
                el.innerText = `COMBO x${combo}`;
                el.style.opacity = '1';
                el.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.transform = 'scale(0.5)';
                }, 300);
            }

            // 視覺回饋
            shake = 10;
            createParticleExplosion();

            // 螢幕損壞視覺
            if (damage > 20) {
                screenObj.material.color.set(0x000000); // 損壞後黑屏
                createCrack();
            }
            
            if (damage > 80) {
                screenObj.material.color.set(Math.random() > 0.5 ? 0xffffff : 0x000000); // 閃爍
            }
        }

        function createCrack() {
            // 用簡單的線條模擬裂痕
            const points = [];
            const centerX = (Math.random() - 0.5) * 2;
            const centerY = 1.3 + (Math.random() - 0.5) * 1;
            
            for(let i = 0; i < 5; i++) {
                points.push(new THREE.Vector3(centerX, centerY, 0.07));
                points.push(new THREE.Vector3(
                    centerX + (Math.random() - 0.5) * 0.5,
                    centerY + (Math.random() - 0.5) * 0.5,
                    0.07
                ));
            }
            
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
            
            // 隨時間稍微變暗
            setTimeout(() => {
                lineMat.opacity = 0.3;
            }, 1000);
        }

        function createParticleExplosion() {
            const count = 15;
            for(let i = 0; i < count; i++) {
                const pGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
                const pMat = new THREE.MeshBasicMaterial({ color: damage > 50 ? 0xffaa00 : 0x0ea5e9 });
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.set(0, 1.3, 0.1);
                
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.2
                );
                
                scene.add(p);
                
                let life = 30;
                function moveP() {
                    p.position.add(vel);
                    vel.y -= 0.005; // 重力
                    life--;
                    if(life > 0) requestAnimationFrame(moveP);
                    else scene.remove(p);
                }
                moveP();
            }
        }

        function animate() {
            const dt = clock.getDelta();

            // 鏡頭震動
            if (shake > 0) {
                camera.position.x = (Math.random() - 0.5) * shake * 0.02;
                camera.position.y = 1.2 + (Math.random() - 0.5) * shake * 0.02;
                shake *= 0.9;
            } else {
                camera.position.x = 0;
                camera.position.y = 1.2;
            }

            // 螢幕輕微晃動 (損壞感)
            if (damage > 0) {
                monitorFrame.rotation.z = Math.sin(Date.now() * 0.01) * (damage / 1000);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
