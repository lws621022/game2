<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>迷你坦克：全面戰爭 (修復版)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border-left: 5px solid #2e5a27; }
        .ammo-info { font-size: 16px; margin-bottom: 8px; }
        .hint { font-size: 12px; color: #aaa; line-height: 1.5; }
        #ammo-name { color: #5dade2; font-weight: bold; }
        #reload-status { font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div class="ammo-info">彈藥種類: <span id="ammo-name">AP (穿甲彈)</span></div>
    <div class="ammo-info">自動裝填: <span id="reload-status">READY</span></div>
    <hr style="border:0; border-top:1px solid #444;">
    <div class="hint">
        [W,A,S,D] 移動底盤<br>
        [滑鼠] 瞄準並射擊<br>
        [1,2,3] 切換彈種<br>
        <span style="color:#e74c3c;">注意：敵人已裝備武裝，請保持移動！</span>
    </div>
</div>

<script>
const GAME_WIDTH = 1200;
const GAME_HEIGHT = 900;
const TANK_SCALE = 0.5;

const config = {
    type: Phaser.AUTO,
    width: GAME_WIDTH,
    height: GAME_HEIGHT,
    backgroundColor: '#2c3e50',
    physics: {
        default: 'arcade',
        arcade: { debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, playerTurret, keys, bullets, enemyBullets, enemies;
let currentAmmoType = 'AP';
let isReloading = false;

// 彈藥數據
const AMMO_DATA = {
    'AP': { name: 'AP (穿甲彈)', speed: 1200, color: 0xffffff, size: 2.5, reload: 800 },
    'HE': { name: 'HE (高爆彈)', speed: 700, color: 0xf1c40f, size: 6, reload: 2000 },
    'HEAT': { name: 'HEAT (破甲彈)', speed: 950, color: 0x9b59b6, size: 3, reload: 1500 }
};

function createTankGraphic(scene, x, y, bodyColor, turretColor) {
    let container = scene.add.container(x, y);
    container.setScale(TANK_SCALE);

    const body = scene.add.rectangle(0, 0, 60, 80, bodyColor);
    const trackL = scene.add.rectangle(-38, 0, 16, 85, 0x111111);
    const trackR = scene.add.rectangle(38, 0, 16, 85, 0x111111);
    container.add([trackL, trackR, body]);
    
    let turretContainer = scene.add.container(0, 0);
    const tBase = scene.add.rectangle(0, 0, 42, 42, turretColor);
    const barrel = scene.add.rectangle(0, -45, 10, 60, 0x111111).setOrigin(0.5, 0.5);
    turretContainer.add([tBase, barrel]);
    container.add(turretContainer);

    scene.physics.world.enable(container);
    container.body.setCollideWorldBounds(true);
    
    // 設置精確碰撞體
    const hitBox = 75 * TANK_SCALE;
    container.body.setSize(hitBox, hitBox);
    
    container.turret = turretContainer;
    container.lastFired = 0; 
    return container;
}

function preload() {}

function create() {
    this.physics.world.setBounds(0, 0, GAME_WIDTH, GAME_HEIGHT);

    // 1. 建立群組
    bullets = this.physics.add.group();
    enemyBullets = this.physics.add.group();
    enemies = this.physics.add.group();

    // 2. 建立玩家
    player = createTankGraphic(this, 600, 800, 0x27ae60, 0x2ecc71);
    playerTurret = player.turret;

    // 3. 生成敵人
    for(let i = 0; i < 5; i++) {
        let rx = Phaser.Math.Between(100, 1100);
        let ry = Phaser.Math.Between(100, 400);
        let enemy = createTankGraphic(this, rx, ry, 0xc0392b, 0xe74c3c);
        enemies.add(enemy);
    }

    // 4. 控制鍵
    keys = this.input.keyboard.addKeys('W,A,S,D,ONE,TWO,THREE');
    this.input.on('pointerdown', fireBullet, this);

    // 5. 碰撞邏輯
    this.physics.add.overlap(bullets, enemies, (b, e) => { 
        b.destroy(); 
        explode(this, e.x, e.y); 
        e.destroy(); 
    }, null, this);

    this.physics.add.overlap(enemyBullets, player, (p, eb) => { 
        eb.destroy(); 
        console.log("玩家被擊中！"); 
    }, null, this);
    
    // 坦克間實體碰撞
    this.physics.add.collider(player, enemies);
    this.physics.add.collider(enemies, enemies);
}

function update(time) {
    if (!player || !player.active) return;

    // --- 玩家移動 ---
    const pBody = player.body;
    if (keys.W.isDown) this.physics.velocityFromRotation(player.rotation - 1.57, 160, pBody.velocity);
    else if (keys.S.isDown) this.physics.velocityFromRotation(player.rotation - 1.57, -80, pBody.velocity);
    else pBody.setVelocity(0);

    if (keys.A.isDown) player.rotation -= 0.04;
    if (keys.D.isDown) player.rotation += 0.04;

    let mouseAngle = Phaser.Math.Angle.Between(player.x, player.y, this.input.x, this.input.y);
    playerTurret.rotation = mouseAngle - player.rotation + 1.57;

    // 彈藥切換
    if (Phaser.Input.Keyboard.JustDown(keys.ONE)) switchAmmo('AP');
    if (Phaser.Input.Keyboard.JustDown(keys.TWO)) switchAmmo('HE');
    if (Phaser.Input.Keyboard.JustDown(keys.THREE)) switchAmmo('HEAT');

    // --- 敵人 AI ---
    enemies.children.iterate((enemy) => {
        if (!enemy || !enemy.active) return true;

        let dist = Phaser.Math.Distance.Between(enemy.x, enemy.y, player.x, player.y);
        let angleToPlayer = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);

        enemy.rotation = Phaser.Math.Angle.RotateTo(enemy.rotation - 1.57, angleToPlayer, 0.02) + 1.57;
        enemy.turret.rotation = angleToPlayer - enemy.rotation + 1.57;

        if (dist > 250) this.physics.velocityFromRotation(enemy.rotation - 1.57, 50, enemy.body.velocity);
        else if (dist < 150) this.physics.velocityFromRotation(enemy.rotation - 1.57, -40, enemy.body.velocity);
        else enemy.body.setVelocity(0);

        if (time > enemy.lastFired && dist < 650) {
            enemyFire(this, enemy);
            enemy.lastFired = time + Phaser.Math.Between(3000, 5000);
        }
        return true;
    });
}

function switchAmmo(type) {
    if (AMMO_DATA[type]) {
        currentAmmoType = type;
        document.getElementById('ammo-name').innerText = AMMO_DATA[type].name;
    }
}

function fireBullet() {
    if (isReloading || !player || !player.active) return;
    const data = AMMO_DATA[currentAmmoType];
    
    // 砲口指向的總角度
    const angle = playerTurret.rotation + player.rotation - 1.57;
    
    // 增加偏移量到 55 像素，完全脫離坦克碰撞箱
    const spawnX = player.x + Math.cos(angle) * 55;
    const spawnY = player.y + Math.sin(angle) * 55;

    // 正確順序：建立 -> 加入物理 -> 設定速度
    const b = this.add.circle(spawnX, spawnY, data.size, data.color);
    this.physics.add.existing(b);
    
    if (b.body) {
        this.physics.velocityFromRotation(angle, data.speed, b.body.velocity);
        bullets.add(b); // 存入群組以便進行碰撞檢測
    }

    isReloading = true;
    updateUI("裝填中...", "#e74c3c");
    this.time.delayedCall(data.reload, () => { 
        isReloading = false; 
        updateUI("READY", "#2ecc71"); 
    });
}

function enemyFire(scene, enemy) {
    if (!enemy || !enemy.active) return;

    const baseAngle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
    const scatter = Phaser.Math.FloatBetween(-0.2, 0.2); 
    const finalAngle = baseAngle + scatter;

    // 敵人子彈生成偏移
    const spawnX = enemy.x + Math.cos(finalAngle) * 45;
    const spawnY = enemy.y + Math.sin(finalAngle) * 45;

    const eb = scene.add.circle(spawnX, spawnY, 3, 0xff4757);
    scene.physics.add.existing(eb);
    
    if (eb.body) {
        scene.physics.velocityFromRotation(finalAngle, 600, eb.body.velocity);
        enemyBullets.add(eb);
    }

    scene.time.delayedCall(2500, () => { if(eb && eb.active) eb.destroy(); });
}

function explode(scene, x, y) {
    let circle = scene.add.circle(x, y, 30, 0xffa502, 0.8);
    scene.tweens.add({ 
        targets: circle, 
        scale: 2, 
        alpha: 0, 
        duration: 200, 
        onComplete: () => circle.destroy() 
    });
}

function updateUI(text, color) {
    const el = document.getElementById('reload-status');
    if (el) {
        el.innerText = text;
        el.style.color = color;
    }
}
</script>

</body>
</html>
